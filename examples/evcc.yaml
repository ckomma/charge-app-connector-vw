# evcc vehicle example for Volkswagen App Connector.
#
# Before using this file:
# 1. Replace CONNECTOR_HOST with the connector host name or IP address.
# 2. Merge the vehicle entry into the `vehicles` section of evcc.yaml.
# 3. Reference `volkswagen_app` from the appropriate loadpoint if desired.
#
# When evcc and the connector run on the same host, CONNECTOR_HOST can be
# replaced with 127.0.0.1.
# The jq expressions reject failed-cache and source-stale responses so evcc
# does not treat an old connector value as a current vehicle measurement.

vehicles:
  - name: volkswagen_app
    type: custom
    title: Volkswagen App
    icon: car

    soc:
      source: http
      uri: http://CONNECTOR_HOST:9920/charge
      method: GET
      jq: 'if (.stale or .sourceStale) then error("stale Volkswagen connector data") else .soc end'
      cache: 60s
      timeout: 10s

    status:
      source: http
      uri: http://CONNECTOR_HOST:9920/charge
      method: GET
      jq: 'if (.stale or .sourceStale) then error("stale Volkswagen connector data") else .status end'
      cache: 60s
      timeout: 10s

    range:
      source: http
      uri: http://CONNECTOR_HOST:9920/charge
      method: GET
      jq: 'if (.stale or .sourceStale) then error("stale Volkswagen connector data") else .range end'
      cache: 60s
      timeout: 10s

# Optional loadpoint assignment:
#
# loadpoints:
#   - title: Garage
#     charger: your_charger
#     vehicle: volkswagen_app
